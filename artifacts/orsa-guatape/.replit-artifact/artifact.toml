kind = "web"
previewPath = "/"
title = "ORSA Guatapé"
version = "1.0.0"
id = "artifacts/orsa-guatape"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23776

[services.development]
run = "pnpm --filter @workspace/orsa-guatape run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orsa-guatape", "run", "build" ]
publicDir = "artifacts/orsa-guatape/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23776"
BASE_PATH = "/"
